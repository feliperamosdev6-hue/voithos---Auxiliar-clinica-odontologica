<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Troca de Senha - Voithos</title>
  <link rel="stylesheet" href="change-password.css">
</head>
<body>
  <main class="change-password-page">
    <section class="panel">
      <h1>Troca obrigatoria de senha</h1>
      <p>Por seguranca, atualize sua senha temporaria para continuar.</p>

      <form id="change-password-form" class="form-grid">
        <label>
          Senha atual (temporaria)
          <input type="password" id="senha-atual" autocomplete="current-password" required>
        </label>
        <label>
          Nova senha
          <input type="password" id="nova-senha" autocomplete="new-password" required>
        </label>
        <label>
          Confirmar nova senha
          <input type="password" id="confirmar-senha" autocomplete="new-password" required>
        </label>

        <div class="actions">
          <button type="submit" class="btn-primary">Atualizar senha</button>
          <button type="button" id="btn-logout" class="btn-outline">Sair</button>
        </div>
        <p id="error-message" class="error"></p>
      </form>
    </section>
  </main>

  <script src="shared/adapters/desktop-adapter.js"></script>
  <script src="shared/adapters/web-adapter.js"></script>
  <script src="shared/app-api.js"></script>
  <script src="change-password.js"></script>
</body>
</html>
