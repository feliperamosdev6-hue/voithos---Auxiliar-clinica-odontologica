  <header class="top-bar">
    <h2>Agenda mensal</h2>
  </header>

<main class="mes-container">

    <div class="header-mes">
        <button id="prev-month" class="nav-btn">&#9664;</button>
        <h2 id="mes-ano"></h2>
        <button id="next-month" class="nav-btn">&#9654;</button>
    </div>

    <div class="dias-semana">
        <span>Dom</span> <span>Seg</span> <span>Ter</span> <span>Qua</span> 
        <span>Qui</span> <span>Sex</span> <span>Sáb</span>
    </div>

    <div id="grade-mensal" class="grade-mensal"></div>

    <div class="painel-lateral">
        <button id="btn-novo-agendamento" class="btn-novo">+ Novo Agendamento</button>
        <h3>Atendimentos do dia</h3>
        <div id="lista-atendimentos"></div>
    </div>

</main>

<div id="modal-bg" class="modal-bg hidden">
    <div class="modal">
        <h2>Novo Agendamento</h2>

        <label>Paciente:</label>
        <input id="input-paciente" type="text">

        <label>Tipo de atendimento:</label>
        <input id="input-tipo" type="text">

        <label>Horário início:</label>
        <input id="input-hora-inicio" type="text" data-timepicker="true" placeholder="HH:MM" inputmode="numeric">

        <label>Horário fim:</label>
        <input id="input-hora-fim" type="text" data-timepicker="true" placeholder="HH:MM" inputmode="numeric">

        <label>Status:</label>
        <select id="input-status">
            <option value="em_aberto">Em aberto</option>
            <option value="confirmado">Confirmado</option>
            <option value="realizado">Realizado</option>
            <option value="nao_compareceu">Não compareceu</option>
            <option value="cancelado">Cancelado</option>
        </select>

        <div class="modal-actions">
            <button id="btn-salvar-agendamento" class="btn-save">Salvar</button>
            <button id="btn-fechar-modal" class="btn-cancel">Cancelar</button>
        </div>
    </div>
</div>

<div id="modal-editar" class="modal-bg hidden">
  <div class="modal">
      <h2>Editar Agendamento</h2>
      <input id="edit-paciente" type="text" placeholder="Nome do paciente">
      <input id="edit-tipo" type="text" placeholder="Tipo de atendimento">
      <input id="edit-hora-inicio" type="text" data-timepicker="true" placeholder="HH:MM" inputmode="numeric">
      <input id="edit-hora-fim" type="text" data-timepicker="true" placeholder="HH:MM" inputmode="numeric">
      <select id="edit-status">
          <option value="em_aberto">Em aberto</option>
          <option value="confirmado">Confirmado</option>
          <option value="realizado">Realizado</option>
          <option value="nao_compareceu">Não compareceu</option>
          <option value="cancelado">Cancelado</option>
      </select>
      <div class="modal-actions">
          <button id="btn-salvar-edicao" class="btn-save">Salvar</button>
          <button id="btn-cancelar-edicao" class="btn-cancel">Cancelar</button>
      </div>
  </div>
</div>

<script src="timepicker.js"></script>
<script src="shared/adapters/desktop-adapter.js"></script>
<script src="shared/adapters/web-adapter.js"></script>
<script src="shared/app-api.js"></script>
<script src="agenda-mes.js"></script>
    <script src="header.js"></script>
</body>
</html>
