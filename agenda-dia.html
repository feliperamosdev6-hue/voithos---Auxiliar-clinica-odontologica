<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Agenda do Dia</title>
  <link rel="stylesheet" href="timepicker.css" />
  <link rel="stylesheet" href="agenda-dia.css" />
    <link rel="stylesheet" href="header.css">
</head>

<body>
            <header class="header-container">
        <a href="index.html" class="brand-home" aria-label="Ir para inicio"><span class="back-home-icon" aria-hidden="true"></span><span>Inicio</span></a>
        <nav class="main-nav">
            <ul>
                <li><a href="cadastro-paciente.html">Novo cadastro</a></li>
                <li><a href="contratos.html">Contratos</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <div class="attn-menu" id="attn-menu">
                <button class="attn-toggle" id="attn-toggle" type="button" aria-expanded="false" aria-controls="attn-dropdown">
                    Atendimento
                    <span class="attn-caret" aria-hidden="true">&#9662;</span>
                </button>
                <div class="attn-dropdown" id="attn-dropdown" role="menu">
                    <a class="attn-item" href="anamnese.html" role="menuitem">
                        <span class="attn-icon" aria-hidden="true"></span>
                        Anamnese
                    </a>
                    <a class="attn-item" href="receita.html" role="menuitem">
                        <span class="attn-icon" aria-hidden="true"></span>
                        Receituario
                    </a>
                    <a class="attn-item" href="servicos.html" role="menuitem">
                        <span class="attn-icon" aria-hidden="true"></span>
                        Servicos
                    </a>
                    <a class="attn-item" href="agendamentos.html" role="menuitem">
                        <span class="attn-icon" aria-hidden="true"></span>
                        Agenda
                    </a>
                    <a class="attn-item" href="arquivos.html" role="menuitem">
                        <span class="attn-icon" aria-hidden="true"></span>
                        Pacientes
                    </a>
                </div>
            </div>
                        <div class="gestao-menu" id="gestao-menu">
                <button class="gestao-toggle" id="gestao-toggle" type="button" aria-expanded="false" aria-controls="gestao-dropdown">
                    Gestao
                    <span class="gestao-caret" aria-hidden="true">&#9662;</span>
                </button>
                <div class="gestao-dropdown" id="gestao-dropdown" role="menu">
                    <a class="gestao-item" href="gestao.html" role="menuitem">
                        <span class="gestao-icon" aria-hidden="true"></span>
                        <span class="gestao-text">Gestao financeira</span>
                        <span class="gestao-item-caret" aria-hidden="true">&#9656;</span>
                    </a>
                    <a class="gestao-item" href="comunicacao.html" role="menuitem">
                        <span class="gestao-icon" aria-hidden="true"></span>
                        <span class="gestao-text">Comunicacao</span>
                        <span class="gestao-item-caret" aria-hidden="true">&#9656;</span>
                    </a>
                    <a class="gestao-item" href="relacionamento.html" role="menuitem">
                        <span class="gestao-icon" aria-hidden="true"></span>
                        <span class="gestao-text">Relacionamento</span>
                        <span class="gestao-item-caret" aria-hidden="true">&#9656;</span>
                    </a></div>
            </div><div class="user-menu" id="user-menu">
                <button class="user-menu-toggle" id="user-menu-toggle" type="button">
                    <span class="user-avatar" aria-hidden="true">&#128100;</span>
                    <span class="user-label">
                        <span class="user-name" id="user-name">Usuario</span>
                        <span class="user-role-badge" id="user-role">(tipo)</span>
                    </span>
                    <span class="user-caret" aria-hidden="true">&#9662;</span>
                </button>
                <div class="user-menu-dropdown" id="user-menu-dropdown">
                    <button class="user-menu-item" data-action="manage" type="button">Gerenciar usuarios</button>
                    <button class="user-menu-item" data-action="change-password" type="button">Alterar senha</button>
                    <button class="user-menu-item" data-action="logout" type="button">Sair</button>
                </div>
            </div>
        </div>
    </header>

  <header class="top-bar">
    <h2 id="titulo-dia">Agenda do dia</h2>
  </header>

<main class="day-container">
    <section class="birthday-today hidden" id="birthday-today-section">
      <div class="birthday-today-header">
        <h3>🎂 Aniversariantes do dia</h3>
      </div>
      <div class="birthday-today-list" id="birthday-today-list"></div>
    </section>

    <div class="slots-header">
      <span>Horário</span>
      <span>Paciente / Observação</span>
    </div>
    <div id="lista-horarios" class="slots-list"></div>
  </main>

  <div id="modal-editar" class="modal-bg hidden">
    <div class="modal">
        <h2>Editar Agendamento</h2>
        <input id="edit-paciente" type="text" placeholder="Nome do paciente">
        <input id="edit-tipo" type="text" placeholder="Tipo de atendimento">
        <input id="edit-hora-inicio" type="text" data-timepicker="true" placeholder="HH:MM" inputmode="numeric">
        <input id="edit-hora-fim" type="text" data-timepicker="true" placeholder="HH:MM" inputmode="numeric">
        <select id="edit-status">
            <option value="em_aberto">Em aberto</option>
            <option value="confirmado">Confirmado</option>
            <option value="realizado">Realizado</option>
            <option value="nao_compareceu">Não compareceu</option>
            <option value="cancelado">Cancelado</option>
        </select>
        <div class="modal-actions">
            <button id="btn-salvar-edicao" class="btn-save">Salvar</button>
            <button id="btn-cancelar-edicao" class="btn-cancel">Cancelar</button>
        </div>
    </div>
  </div>

  <div id="modal-birthday" class="modal-bg hidden">
    <div class="modal">
      <h2>🎂 Aniversario do paciente</h2>
      <p><strong>Paciente:</strong> <span id="birthday-modal-name">-</span></p>
      <p><strong>Telefone:</strong> <span id="birthday-modal-phone">-</span></p>
      <p><strong>Status:</strong> <span id="birthday-modal-status">-</span></p>
      <div class="modal-actions">
        <button id="birthday-modal-send" class="btn-save">Enviar parabens</button>
        <button id="birthday-modal-cancel" class="btn-cancel">Fechar</button>
      </div>
    </div>
  </div>

  <script src="timepicker.js"></script>
  <script src="shared/adapters/desktop-adapter.js"></script>
  <script src="shared/adapters/web-adapter.js"></script>
  <script src="shared/app-api.js"></script>
  <script src="agenda-dia.js"></script>
    <script src="header.js"></script>
</body>
</html>
