<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Demo | Voithos</title>
  <link rel="stylesheet" href="demo.css">
</head>
<body class="demo-dashboard-page">
  <main class="demo-shell demo-dashboard-shell">
    <header class="demo-dashboard-header">
      <div>
        <img src="assets/logo-voithos.svg" alt="Voithos" class="demo-logo demo-logo-small">
        <span class="demo-badge">Demonstracao ativa</span>
        <h1 id="demo-profile-title">Dashboard de demonstracao</h1>
        <p id="demo-profile-description">Fluxo curado para apresentar o produto sem login real.</p>
      </div>
      <div class="demo-header-actions">
        <button type="button" class="demo-secondary-button" id="demo-switch-profile">Trocar perfil</button>
        <button type="button" class="demo-secondary-button" id="demo-exit">Sair da demonstracao</button>
      </div>
    </header>

    <section class="demo-profile-summary" id="demo-profile-summary"></section>
    <section class="demo-module-grid" id="demo-module-grid"></section>
  </main>
  <script src="demo.js"></script>
</body>
</html>
