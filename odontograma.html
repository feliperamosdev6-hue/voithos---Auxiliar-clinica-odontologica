  <script>
  (function () {
    var selecionados = {};
    var selecionadosHistorico = {};
    var selecionadosHistoricoFila = {};
    var root = document.getElementById("odontograma-root");
    if (!root) return;

    var faceOrder = ['D', 'L', 'M', 'O', 'V'];
    var modoAtual = 'permanente';
    var permanenteContainer = document.getElementById('odontograma-permanente-container');
    var deciduoContainer = document.getElementById('odontograma-deciduo-container');
    function isDenteDeciduo(dente) {
      var valor = String(dente || '').trim();
      return /^(5|6|7|8)\d$/.test(valor);
    }
    function dentePertenceAoModo(dente, modo) {
      if (!dente) return false;
      var isDeciduo = isDenteDeciduo(dente);
      return String(modo || 'permanente') === 'deciduo' ? isDeciduo : !isDeciduo;
    }
    function aplicarModoOdontograma(modo) {
      modoAtual = String(modo || 'permanente') === 'deciduo' ? 'deciduo' : 'permanente';
      if (permanenteContainer) {
        permanenteContainer.style.display = modoAtual === 'permanente' ? '' : 'none';
        permanenteContainer.setAttribute('aria-hidden', modoAtual === 'permanente' ? 'false' : 'true');
      }
      if (deciduoContainer) {
        deciduoContainer.style.display = modoAtual === 'deciduo' ? '' : 'none';
        deciduoContainer.setAttribute('aria-hidden', modoAtual === 'deciduo' ? 'false' : 'true');
      }
    }
    function getFacesOrdenadas(map) {
      return faceOrder.filter(function (face) { return map && map[face]; });
    }

    function getFacesCombinadas(dente) {
      var merged = {};
      var hist = selecionadosHistorico[dente] || {};
      var histFila = selecionadosHistoricoFila[dente] || {};
      var atual = selecionados[dente] || {};
      Object.keys(hist).forEach(function (f) { merged[f] = true; });
      Object.keys(histFila).forEach(function (f) { merged[f] = true; });
      Object.keys(atual).forEach(function (f) { merged[f] = true; });
      return merged;
    }

    function syncToothVisual(toothEl, dente) {
      if (!toothEl || !dente) return;
      var merged = getFacesCombinadas(dente);
      var facesAtivas = getFacesOrdenadas(merged);
      var hasWorking = Boolean(selecionados[dente]);
      var hasHistory = Boolean(selecionadosHistorico[dente] || selecionadosHistoricoFila[dente]);
      var hasSelection = hasWorking || hasHistory;
      toothEl.classList.toggle('is-selected', hasSelection);
      toothEl.classList.toggle('is-working-selection', hasWorking);
      toothEl.classList.toggle('is-history-selection', hasHistory && !hasWorking);
      toothEl.classList.toggle('full-selected', facesAtivas.length === faceOrder.length);
      toothEl.querySelectorAll('.face').forEach(function (f) {
        var face = String(f.getAttribute('data-face') || '').trim();
        f.classList.toggle('ativa', Boolean(face && merged[face]));
      });
    }

    function syncAllTeethVisual() {
      var teeth = root.querySelectorAll('.tooth');
      teeth.forEach(function (toothEl) {
        var d = String(toothEl.getAttribute('data-dente') || '').trim();
        if (!d) return;
        syncToothVisual(toothEl, d);
      });
    }

    function buildResumo(lastDente) {
      var dentes = Object.keys(selecionados).filter(function (d) { return dentePertenceAoModo(d, modoAtual); }).sort(function (a, b) { return Number(a) - Number(b); });
      var resumo = dentes.map(function (d) {
        var faces = getFacesOrdenadas(selecionados[d]);
        if (faces.length === faceOrder.length) return d + '(Completo)';
        return faces.length ? (d + '(' + faces.join('') + ')') : d;
      });
      var facesAtual = [];
      var fullAtual = false;
      if (lastDente && selecionados[lastDente] && dentePertenceAoModo(lastDente, modoAtual)) {
        facesAtual = getFacesOrdenadas(selecionados[lastDente]);
        fullAtual = facesAtual.length === faceOrder.length;
      }
      return { dentes: dentes, resumo: resumo, lastDente: lastDente || '', lastFaces: facesAtual, lastFull: fullAtual, mode: modoAtual };
    }

    function enviarSelecao(lastDente) {
      if (!window.parent) return;
      var payload = buildResumo(lastDente);
      window.parent.postMessage({ type: "odontograma:update", payload: payload }, "*");
    }

    function limparTooth(tooth, dente) {
      delete selecionados[dente];
      syncToothVisual(tooth, dente);
    }

    var ultimoDente = '';

    function selecionarToothSimples(tooth, dente) {
      selecionados[dente] = selecionados[dente] || {};
      syncToothVisual(tooth, dente);
      ultimoDente = dente;
    }

    root.addEventListener("click", function (e) {
      var tooth = e.target.closest(".tooth");
      if (!tooth) return;
      var dente = tooth.getAttribute("data-dente");
      if (!dente) return;

      if (selecionados[dente]) {
        limparTooth(tooth, dente);
        if (ultimoDente === dente) ultimoDente = '';
        enviarSelecao(ultimoDente);
        return;
      }

      selecionarToothSimples(tooth, dente);
      enviarSelecao(ultimoDente);
    });

    aplicarModoOdontograma(modoAtual);

    window.addEventListener('message', function (event) {
      if (!event || !event.data) return;
      if (event.data.type === 'odontograma:set-mode') {
        aplicarModoOdontograma(event.data.mode || 'permanente');
        if (ultimoDente && !dentePertenceAoModo(ultimoDente, modoAtual)) {
          ultimoDente = '';
        }
        enviarSelecao(ultimoDente);
        return;
      }
      if (event.data.type === 'odontograma:set-dentes') {
        var dentes = Array.isArray(event.data.dentes) ? event.data.dentes.map(function (d) { return String(d).trim(); }).filter(Boolean) : [];
        var keep = {};
        dentes.forEach(function (d) { keep[d] = true; });

        Object.keys(selecionados).forEach(function (d) {
          if (!keep[d]) {
            delete selecionados[d];
          }
        });

        var teeth = root.querySelectorAll('.tooth');
        teeth.forEach(function (toothEl) {
          var d = String(toothEl.getAttribute('data-dente') || '').trim();
          if (!d) return;
          if (keep[d]) {
            selecionados[d] = selecionados[d] || {};
          }
          syncToothVisual(toothEl, d);
        });

        ultimoDente = String(event.data.lastDente || dentes[dentes.length - 1] || '').trim();
        enviarSelecao(ultimoDente);
        return;
      }
      if (event.data.type === 'odontograma:clear-selection') {
        selecionados = {};
        ultimoDente = '';
        syncAllTeethVisual();
        enviarSelecao('');
        return;
      }
      if (event.data.type === 'odontograma:clear-working-selection') {
        selecionados = {};
        ultimoDente = '';
        syncAllTeethVisual();
        enviarSelecao('');
        return;
      }
      if (event.data.type === 'odontograma:clear-queue-history') {
        selecionadosHistoricoFila = {};
        syncAllTeethVisual();
        return;
      }
      if (event.data.type !== 'odontograma:set-faces') return;
      var dente = String(event.data.dente || '').trim();
      if (!dente) return;
      var tooth = root.querySelector('.tooth[data-dente="' + dente + '"]');
      if (!tooth) return;

      var faces = Array.isArray(event.data.faces) ? event.data.faces : [];
      var isHistorico = Boolean(event.data.historico);
      var historyBucket = String(event.data.historyBucket || '').trim().toLowerCase();
      var targetMap = selecionados;
      if (isHistorico) {
        targetMap = historyBucket === 'queue' ? selecionadosHistoricoFila : selecionadosHistorico;
      }
      targetMap[dente] = {};
      faces.forEach(function (face) { targetMap[dente][face] = true; });

      if (!faces.length && !isHistorico) {
        delete targetMap[dente];
      }

      syncToothVisual(tooth, dente);
      if (!isHistorico) {
        ultimoDente = dente;
        enviarSelecao(dente);
      }
    });
  })();

    function getToothType(dente) {
      var num = Number(dente);
      if (!num) return 'incisivo';
      var digit = num % 10;
      if (digit <= 2) return 'incisivo';
      if (digit == 3) return 'canino';
      if (digit == 4) return 'premolar';
      if (digit == 5) return 'premolar2';
      return 'molar';
    }

    function getToothSymbolId(dente) {
      var refinedMolarUpperTeeth = {
        '18': true, '17': true, '16': true, '26': true, '27': true, '28': true
      };
      if (refinedMolarUpperTeeth[String(dente)]) return 'tooth-refined-18';
      var refinedMolarLowerTeeth = {
        '48': true, '47': true, '46': true, '38': true, '37': true, '36': true
      };
      if (refinedMolarLowerTeeth[String(dente)]) return 'tooth-refined-18';
      var refinedTeeth = {
        '15': true, '25': true, '35': true, '45': true
      };
      if (refinedTeeth[String(dente)]) return 'tooth-refined-25';
      return 'tooth-' + getToothType(dente);
    }

    function applyToothShapes() {
      var root = document.getElementById("odontograma-root");
      if (!root) return;
      var teeth = root.querySelectorAll('.tooth');
      teeth.forEach(function (tooth) {
        var dente = tooth.getAttribute('data-dente') || '';
        var toothType = getToothType(dente);
        tooth.classList.toggle('tooth-molar', toothType === 'molar');
        var svg = tooth.querySelector('svg');
        if (!svg) return;
        while (svg.firstChild) { svg.removeChild(svg.firstChild); }
        var symbolId = getToothSymbolId(dente);
        var symbol = document.getElementById(symbolId);
        if (!symbol) {
          symbolId = 'tooth-' + getToothType(dente);
          symbol = document.getElementById(symbolId);
        }
        if (symbol && symbol.getAttribute('viewBox')) {
          svg.setAttribute('viewBox', symbol.getAttribute('viewBox'));
        } else {
          svg.setAttribute('viewBox', '0 0 100 140');
        }
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        var fillUse = document.createElementNS('http://www.w3.org/2000/svg', 'use');
        fillUse.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#' + symbolId);
        fillUse.setAttribute('href', '#' + symbolId);
        fillUse.setAttribute('class', 'tooth-fill');
        svg.appendChild(fillUse);

        var use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
        use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#' + symbolId);
        use.setAttribute('href', '#' + symbolId);
        use.setAttribute('class', 'tooth-stroke');
        svg.appendChild(use);

        // Centraliza o desenho real do simbolo no centro do viewBox
        // para manter alinhamento consistente entre tipos de dente.
        try {
          var vb = svg.viewBox && svg.viewBox.baseVal ? svg.viewBox.baseVal : null;
          var bb = use.getBBox();
          if (
            vb && bb &&
            Number.isFinite(bb.x) && Number.isFinite(bb.width) && bb.width > 0 &&
            Number.isFinite(bb.y) && Number.isFinite(bb.height) && bb.height > 0
          ) {
            var targetCx = vb.x + (vb.width / 2);
            var currentCx = bb.x + (bb.width / 2);
            var dx = targetCx - currentCx;
            var targetCy = vb.y + (vb.height / 2);
            var currentCy = bb.y + (bb.height / 2);
            var dy = targetCy - currentCy;
            var dxValue = Math.abs(dx) > 0.01 ? dx.toFixed(3) : '0';
            var dyValue = Math.abs(dy) > 0.01 ? dy.toFixed(3) : '0';
            fillUse.setAttribute('x', dxValue);
            fillUse.setAttribute('y', dyValue);
            use.setAttribute('x', dxValue);
            use.setAttribute('y', dyValue);
          }
        } catch (_err) {
          // Em fallback, mantem renderizacao padrao sem bloquear o restante.
        }
      });
    }

    applyToothShapes();
</script>
