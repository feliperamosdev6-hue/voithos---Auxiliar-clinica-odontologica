    <header class="page-header">
        <h1>Cadastro paciente</h1>
    </header>

<main class="container">
        <div class="form-container">
            <div class="form-header">
                <i class="fa-solid fa-user-pen icon-header"></i>
                <h2>Informações Pessoais</h2>
            </div>

            <form id="patient-form">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="prontuario">Número do Prontuário</label>
                        <input type="text" id="prontuario" name="prontuario" readonly placeholder="Gerado automaticamente">
                    </div>
                    <div class="form-group full-width">
                        <label for="fullName">Nome Completo <span class="required">*</span></label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>
                    <div class="form-group">
                        <label for="dataNascimento">Data de Nasc. <span class="required">*</span></label>
                        <input type="date" id="dataNascimento" name="dataNascimento" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF <span class="required">*</span></label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="form-group">
                        <label for="rg">RG</label>
                        <input type="text" id="rg" name="rg" placeholder="00.000.000-0">
                    </div>
                    <div class="form-group" id="dentista-group">
                        <label for="selectDentista">Dentista responsavel</label>
                        <select id="selectDentista">
                            <option value="">Selecione...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="phone">Telefone / Celular <span class="required">*</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="(00) 90000-0000" required>
                    </div>
                    <div class="form-group">
                        <label for="allowsMessages">Permite mensagens (WhatsApp/SMS/Email)</label>
                        <input type="checkbox" id="allowsMessages" name="allowsMessages" checked>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="exemplo@email.com">
                    </div>
                    <div class="form-group full-width">
                        <label for="address">Endereço</label>
                        <input type="text" id="address" name="address" placeholder="Rua, Número, Bairro, Cidade - Estado">
                    </div>
                    <div class="form-group full-width">
                        <label for="notes">Observações / Anamnese Inicial</label>
                        <textarea id="notes" name="notes" rows="4"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>Selfie do paciente</label>
                        <div class="selfie-upload">
                            <button type="button" id="selfie-select-btn" class="selfie-card" aria-label="Selecionar selfie">
                                <img id="selfie-preview" alt="Preview da selfie" hidden>
                                <span id="selfie-placeholder" class="selfie-placeholder">+</span>
                            </button>
                            <div class="selfie-meta">
                                <p id="selfie-file-name">Nenhum arquivo selecionado.</p>
                                <button type="button" id="selfie-remove-btn" class="selfie-remove-btn">Remover selfie</button>
                            </div>
                        </div>
                        <input type="file" id="selfie-input" hidden accept=".png,.jpg,.jpeg,.svg,.pdf,image/png,image/jpeg,image/svg+xml,application/pdf">
                    </div>
                </div>
                <button type="submit" class="submit-button">Cadastrar Paciente</button>
            </form>
        </div>
