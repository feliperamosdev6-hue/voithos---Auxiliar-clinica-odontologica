    <header class="page-header">
        <h1>Anamnese</h1>
    </header>

<main class="container">
    <div class="form-container">
      <div class="form-header">
        <i class="fa-solid fa-notes-medical icon-header"></i>
        <h2>Ficha de anamnese</h2>
      </div>

      <form id="anamnese-form">
        <div class="form-grid">
          <div class="form-group full-width">
            <div class="patient-lookup">
              <label>
                Prontuario
                <input type="text" id="prontuarioInput" name="prontuario" placeholder="Digite o numero do prontuario">
              </label>
              <label>
                CPF
                <input type="text" id="cpfInput" name="cpf" placeholder="Digite o CPF">
              </label>
              <button type="button" id="searchPatientBtn" class="submit-button">Buscar paciente</button>
            </div>
            <div id="patientSearchResult" class="patient-result"></div>
            <label class="full-width">
              Paciente
              <input type="text" id="patientName" name="patientName" placeholder="Nome do paciente" readonly>
            </label>
            <input type="hidden" id="patientProntuario" name="patientProntuario">
          </div>
          <div id="dynamic-form-fields" class="full-width"></div>
          <input type="hidden" id="deviceInfo" name="deviceInfo">
        </div>

        <div class="form-actions">
          <button type="submit" class="submit-button">Salvar anamnese</button>
        </div>
        <div id="formMessage" class="form-message" role="status" aria-live="polite"></div>
      </form>
    </div>
  </main>

  <script src="shared/adapters/desktop-adapter.js"></script>
